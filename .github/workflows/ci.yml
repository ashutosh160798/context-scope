name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build
        run: swift build

      # Run the whole suite. `swift test` from the root only runs the app's own
      # test target — it does NOT run the path-dependency packages' tests. The
      # script iterates every package so Core/Capture/Storage/Viz/DemoData are
      # actually exercised in CI.
      - name: Test
        run: bash Scripts/test.sh

      - name: Ad-hoc sign binary
        run: bash Scripts/sign.sh
